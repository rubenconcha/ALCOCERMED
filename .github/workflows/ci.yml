name: Frontend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check JavaScript
        run: |
          node --check script.js
          node --check admin.js
      - name: Check required files
        run: |
          test -f index.html
          test -f admin.html
          test -f config.js
          test -f vercel.json
